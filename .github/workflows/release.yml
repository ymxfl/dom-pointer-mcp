name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # Required for npm provenance
  attestations: write # Required for build provenance attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Update npm for OIDC support
        # npm 12 requires Node >=22; npm 11.5.1 supports OIDC and Node 20.
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build all packages
        run: pnpm build

      - name: Copy README for npm package
        run: cp README.md packages/server/README.md

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v3.0.0
        with:
          subject-path: 'packages/*/dist/**'

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Chrome extension manifest in changeset PR
        if: steps.changesets.outputs.hasChangesets == 'true'
        run: |
          git fetch origin changeset-release/main
          git checkout changeset-release/main
          pnpm -C packages/chrome-extension bump-manifest
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add packages/chrome-extension/src/manifest.json
          git diff --staged --quiet || git commit -m "Update Chrome extension manifest version"
          git push origin changeset-release/main

      - name: Clean up copied README
        run: rm -f packages/server/README.md

      - name: Detect Chrome extension version bump
        id: ext-version
        run: |
          EXT_VERSION=$(node -p "require('./packages/chrome-extension/package.json').version")
          echo "version=${EXT_VERSION}" >> "$GITHUB_OUTPUT"
          if git tag --list | grep -qx "@dom-pointer-mcp/chrome-extension@${EXT_VERSION}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Chrome extension for release
        if: steps.ext-version.outputs.changed == 'true'
        run: pnpm -C packages/chrome-extension build

      - name: Package Chrome extension for release
        if: steps.ext-version.outputs.changed == 'true'
        working-directory: packages/chrome-extension/dist
        run: zip -r ../../../dom-pointer-mcp-chrome-extension.zip .

      - name: Determine release tag
        id: release-tag
        if: steps.ext-version.outputs.changed == 'true'
        run: |
          # 扩展 Release 始终用扩展自身版本号，与 server 版本解耦。
          # 纯数字 tag 供扩展"检查更新"读取；带包名 tag 供归档溯源。
          VERSION="${{ steps.ext-version.outputs.version }}"
          PKG_TAG="@dom-pointer-mcp/chrome-extension@${VERSION}"
          git tag "$VERSION"
          git tag "$PKG_TAG"
          git push origin "$VERSION"
          git push origin "$PKG_TAG"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload Chrome extension to release
        if: steps.ext-version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          files: dom-pointer-mcp-chrome-extension.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 自动发布到 Chrome 应用商店（暂时禁用）。
      # 启用前需在仓库 Secrets 配置：
      #   CHROME_EXTENSION_ID / CHROME_CLIENT_ID / CHROME_CLIENT_SECRET / CHROME_REFRESH_TOKEN
      # 取消下方注释即可启用。
      # - name: Publish Chrome extension to Web Store
      #   if: steps.changesets.outputs.published == 'true' || steps.ext-version.outputs.changed == 'true'
      #   uses: mnao305/chrome-extension-upload@v5.0.0
      #   with:
      #     file-path: dom-pointer-mcp-chrome-extension.zip
      #     extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
      #     client-id: ${{ secrets.CHROME_CLIENT_ID }}
      #     client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
      #     refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
      #     publish: true

