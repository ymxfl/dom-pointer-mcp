<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>DOM Pointer MCP Settings</h1>
    </header>

    <div class="server-status checking" id="serverStatus">
      <span class="status-indicator" id="statusIndicator">⏳</span>
      <span class="status-text" id="statusText">Checking server...</span>
      <button type="button" id="recheckBtn" class="btn-recheck">Recheck</button>
    </div>

    <form class="config-form">
      <div class="field-group">
        <label class="toggle-label">
          <input type="checkbox" id="enabled" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-text">Extension Enabled</span>
        </label>
      </div>

      <div class="field-group">
        <label class="toggle-label">
          <input type="checkbox" id="clearAfterSend" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-text">Clear selection after Send</span>
        </label>
      </div>

      <div class="field-group">
        <label for="triggerKey" class="field-label">Trigger Key</label>
        <select id="triggerKey" class="field-input">
          <option value="Alt">Alt</option>
          <option value="Ctrl">Ctrl</option>
          <option value="Meta">Meta</option>
        </select>
        <span class="field-hint">Hold this key to enter pointing mode</span>
        <div class="conflict-warning" id="conflictWarning"></div>
      </div>

      <div class="field-group">
        <label for="port" class="field-label">MCP Server Port</label>
        <input type="number" id="port" class="field-input" min="1" max="65535" placeholder="7007">
        <span class="field-hint">Port for WebSocket connection to MCP server</span>
      </div>

      <div class="button-group">
        <button type="button" id="saveBtn" class="btn btn-primary">Save Settings</button>
        <button type="button" id="resetBtn" class="btn btn-secondary">Reset to Defaults</button>
      </div>
    </form>

    <div class="status" id="status"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
