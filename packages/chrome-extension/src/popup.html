<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 id="title"></h1>
    </header>

    <div class="server-status checking" id="serverStatus">
      <span class="status-indicator" id="statusIndicator">⏳</span>
      <span class="status-text" id="statusText"></span>
      <button type="button" id="recheckBtn" class="btn-recheck"></button>
    </div>

    <form class="config-form">
      <div class="switch-stack">
        <label class="toggle-label">
          <input type="checkbox" id="enabled" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-text" id="enabledLabel"></span>
        </label>

        <label class="toggle-label">
          <input type="checkbox" id="clearAfterSend" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-text" id="clearAfterSendLabel"></span>
        </label>

        <label class="toggle-label">
          <input type="checkbox" id="captureScreenshot" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-text" id="captureScreenshotLabel"></span>
        </label>

        <label class="toggle-label">
          <input type="checkbox" id="showHistoryDrawer" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-text" id="showHistoryDrawerLabel"></span>
        </label>
      </div>

      <div class="field-grid">
        <div class="field-group">
          <label for="triggerKey" class="field-label" id="triggerKeyLabel"></label>
          <select id="triggerKey" class="field-input"></select>
          <span class="field-hint" id="triggerKeyHint"></span>
        </div>

        <div class="field-group">
          <label for="port" class="field-label" id="portLabel"></label>
          <input type="number" id="port" class="field-input" min="1" max="65535" placeholder="7007">
          <span class="field-hint" id="portHint"></span>
        </div>

        <div class="field-group field-group-wide">
          <label for="locale" class="field-label" id="localeLabel"></label>
          <select id="locale" class="field-input">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>

      <div class="conflict-warning" id="conflictWarning"></div>

      <div class="button-group">
        <button type="button" id="saveBtn" class="btn btn-primary"></button>
        <button type="button" id="resetBtn" class="btn btn-secondary"></button>
      </div>
    </form>

    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
