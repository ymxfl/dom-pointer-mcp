<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 id="title"></h1>
      <a id="aboutLink" class="about-link" href="https://github.com/ymxfl/dom-pointer-mcp" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 16 16" width="18" height="18" aria-hidden="true" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"></path>
        </svg>
      </a>
    </header>

    <div class="server-status checking" id="serverStatus">
      <span class="status-indicator" id="statusIndicator">⏳</span>
      <span class="status-text" id="statusText"></span>
      <button type="button" id="recheckBtn" class="btn-recheck"></button>
    </div>

    <div class="update-status" id="updateStatus">
      <span class="update-version" id="updateVersion"></span>
      <span class="update-text" id="updateText"></span>
      <a class="update-link" id="updateLink" href="#" target="_blank" rel="noopener noreferrer" hidden></a>
      <button type="button" id="checkUpdateBtn" class="btn-recheck"></button>
    </div>

    <form class="config-form">
      <div class="switch-stack">
        <label class="toggle-label">
          <input type="checkbox" id="enabled" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-text" id="enabledLabel"></span>
        </label>

        <label class="toggle-label">
          <input type="checkbox" id="clearAfterSend" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-text" id="clearAfterSendLabel"></span>
        </label>

        <label class="toggle-label">
          <input type="checkbox" id="captureScreenshot" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-text" id="captureScreenshotLabel"></span>
        </label>

        <label class="toggle-label">
          <input type="checkbox" id="showHistoryDrawer" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-text" id="showHistoryDrawerLabel"></span>
        </label>
      </div>

      <div class="field-grid">
        <div class="field-group">
          <label for="triggerKey" class="field-label" id="triggerKeyLabel"></label>
          <select id="triggerKey" class="field-input"></select>
          <span class="field-hint" id="triggerKeyHint"></span>
        </div>

        <div class="field-group">
          <label for="port" class="field-label" id="portLabel"></label>
          <input type="number" id="port" class="field-input" min="1" max="65535" placeholder="7007">
          <span class="field-hint" id="portHint"></span>
        </div>

        <div class="field-group field-group-wide">
          <label for="locale" class="field-label" id="localeLabel"></label>
          <select id="locale" class="field-input">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>

      <div class="conflict-warning" id="conflictWarning"></div>

      <div class="button-group">
        <button type="button" id="saveBtn" class="btn btn-primary"></button>
        <button type="button" id="resetBtn" class="btn btn-secondary"></button>
      </div>
    </form>

    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
